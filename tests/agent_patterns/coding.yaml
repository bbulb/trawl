# shard: coding — Claude Code/openclaw/hermes의 코딩 도우미 호출 양상.
#
# 이 shard의 모든 패턴은 single_fetch 또는 code_heavy_query 카테고리에
# 속한다 (반복 visit·host transfer·compositional은 workflows.yaml로
# 분리). assertion·budget는 보수적으로 잡아 사이트 개편 등으로 ground
# truth가 흔들려도 false negative 가능성을 낮췄다.
#
# meta.drives 는 어느 후속 spike의 측정에 활용되는지 표기:
#   - C6 hybrid     dense+sparse 도입 전·후 recall 비교
#   - C7 HEAD probe Content-Type 라우팅 검증
#   - C8 cache      반복 호출 latency 비교 (workflows.yaml에서 주로 활용)
#   - C9 ceiling    per-host wait_for_ms 학습 신호

patterns:
  # ============================================================
  # Python 생태계 (5)
  # ============================================================

  - id: claude_code_python_asyncio_lookup
    primary_agent: [claude_code]
    category: code_heavy_query
    description: "Python stdlib asyncio docs에서 task gather 사용법"
    url: "https://docs.python.org/3/library/asyncio-task.html"
    query: "how to gather coroutines and handle exceptions"
    live: required
    assertions:
      chunks_contain_any: ["asyncio.gather", "TaskGroup", "create_task"]
      n_chunks_returned: ">= 3"
      profile_used: false
      error_is_none: true
    budgets:
      total_ms_p95: 14000
    meta:
      drives: ["C6 hybrid"]

  - id: claude_code_python_pathlib_lookup
    primary_agent: [claude_code]
    category: code_heavy_query
    description: "Python pathlib Path 사용법 — glob/iterdir 같은 고빈도 메서드"
    url: "https://docs.python.org/3/library/pathlib.html"
    query: "iterate over files matching a pattern recursively"
    live: required
    assertions:
      chunks_contain_any: ["rglob", "glob", "iterdir"]
      n_chunks_returned: ">= 3"
      error_is_none: true
    budgets:
      total_ms_p95: 14000
    meta:
      drives: ["C6 hybrid"]

  - id: claude_code_pypi_requests_page
    primary_agent: [claude_code]
    category: single_fetch
    description: "PyPI의 requests 패키지 페이지에서 latest version + summary"
    url: "https://pypi.org/project/requests/"
    query: "what version of requests is the latest stable release"
    live: required
    assertions:
      chunks_contain_any: ["requests", "Python HTTP"]
      n_chunks_returned: ">= 3"
      error_is_none: true
    budgets:
      total_ms_p95: 12000

  - id: claude_code_pydantic_v2_validators
    primary_agent: [claude_code]
    category: code_heavy_query
    description: "Pydantic v2 docs — validator decorator 사용법"
    url: "https://docs.pydantic.dev/latest/concepts/validators/"
    query: "how to write a field validator with mode before"
    live: required
    assertions:
      chunks_contain_any: ["@field_validator", "field_validator", "mode='before'", "mode=\"before\""]
      n_chunks_returned: ">= 3"
      error_is_none: true
    budgets:
      total_ms_p95: 14000
    meta:
      drives: ["C6 hybrid"]

  - id: claude_code_fastapi_dependency_injection
    primary_agent: [claude_code]
