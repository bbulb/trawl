name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: pip install -e '.[dev]'
      - name: Run unit tests
        # Unit tests only — the parity matrix needs a live bge-m3
        # llama-server and is run manually. We select tests that don't
        # require network/Playwright/VLM.
        run: pytest tests/test_profiles.py tests/test_profile_transfer.py -v
