# Profile evaluation cases for VLM prompt tuning.
#
# Broader URL set than the benchmark — covers more site types and
# layouts to surface VLM prompt weaknesses. Each case has a reference
# query for GT scoring, but the profile is always generated query-agnostic.
#
# Expected selector quality:
#   - ideal: selector targets the article/content body precisely
#   - acceptable: selector targets a container slightly larger than needed
#     but still excludes nav/footer/sidebar
#   - too_wide: selector captures body-level or near-body container
#   - fail: profile generation fails entirely
#
# Categories (for analysis grouping):
#   docs, wiki, news_article, news_listing, product, finance,
#   qa, blog, gov, ecommerce, social, recipe, reference, dashboard

cases:
  # ===== DOCS =====
  - id: python_asyncio
    category: docs
    url: "https://docs.python.org/3/library/asyncio-task.html"
    query: "how to create and await an async task"
    description: "Python stdlib docs — sidebar + main content, code blocks"

  - id: mdn_fetch
    category: docs
    url: "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch"
    query: "how to make a POST request with Fetch"
    description: "MDN — left sidebar, breadcrumb, article body with code"

  - id: react_usestate
    category: docs
    url: "https://react.dev/reference/react/useState"
    query: "how to use useState hook"
    description: "React docs — sidebar, tabbed code samples"

  - id: tailwind_flex
    category: docs
    url: "https://tailwindcss.com/docs/flex"
    query: "how to use flexbox utilities in Tailwind"
    description: "Tailwind docs — left sidebar, utility class reference table"

  - id: nextjs_routing
    category: docs
    url: "https://nextjs.org/docs/app/building-your-application/routing"
    query: "how does file-based routing work in Next.js"
    description: "Next.js docs — sidebar navigation, inline diagrams"

  - id: rust_book_ownership
    category: docs
    url: "https://doc.rust-lang.org/book/ch04-01-what-is-ownership.html"
    query: "what is ownership in Rust"
    description: "Rust Book — minimal sidebar, prose-heavy with code blocks"

